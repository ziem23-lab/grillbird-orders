<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Grillbird Orders">
<title>Grillbird — Order Pads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Karla:wght@0,400;0,500;0,700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6EFE2; --card:#FCF7ED; --pepper:#2A2520; --pepper-soft:#7A7064;
    --olive:#5F6E36; --olive-tint:#EAEFD7; --terracotta:#BD4F2B;
    --line:#E6DCC8; --shadow:0 1px 0 rgba(42,37,32,.04);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Karla',system-ui,sans-serif;background:var(--cream);color:var(--pepper);
    font-size:17px;line-height:1.4;padding-bottom:40px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 18px;}

  header{padding:30px 0 8px;}
  .kicker{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--olive);font-weight:700;margin:0 0 4px;}
  h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:52px;line-height:.9;letter-spacing:.01em;margin:0;}
  .sub{margin:12px 0 0;font-size:15px;color:var(--pepper-soft);}

  .list{margin:24px 0 0;}
  .card{
    display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;
    padding:16px 16px;margin:11px 0;border-radius:13px;background:var(--card);
    border:1px solid var(--line);border-left:5px solid var(--olive);box-shadow:var(--shadow);
    transition:background .12s,transform .05s;
  }
  .card:active{background:var(--olive-tint);transform:scale(.995);}
  .card-main{flex:1 1 auto;min-width:0;}
  .card-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.04em;line-height:1;color:var(--pepper);}
  .card-tag{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--olive);font-weight:700;margin-top:5px;}
  .card-note{font-size:14px;color:var(--pepper-soft);margin-top:5px;}
  .chev{flex:0 0 auto;font-size:30px;color:var(--terracotta);line-height:1;}

  .empty{color:var(--pepper-soft);font-style:italic;padding:30px 4px;text-align:center;}
  footer{margin:28px 0 0;font-size:13px;color:var(--pepper-soft);text-align:center;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="kicker">Grillbird</p>
    <h1>Order Pads</h1>
    <p class="sub">Tap a vendor to build and send an order.</p>
  </header>

  <div class="list" id="list"></div>

  <footer>Add this page to your home screen for one-tap access.</footer>
</div>

<script>
  // ---- Vendor pads. Add a vendor: drop in its HTML file, then add a line here. ----
  const VENDORS = [
    { name:"SK Produce", tag:"Produce · Phinney", note:"Order by 7 AM for same-day delivery", file:"sk-produce.html" },
  ];

  const list = document.getElementById('list');
  if(!VENDORS.length){
    list.innerHTML = '<div class="empty">No order pads yet.</div>';
  } else {
    VENDORS.forEach(v=>{
      const a = document.createElement('a');
      a.className = 'card';
      a.href = v.file;
      a.innerHTML = `
        <div class="card-main">
          <div class="card-name">${v.name}</div>
          <div class="card-tag">${v.tag}</div>
          ${v.note ? `<div class="card-note">${v.note}</div>` : ``}
        </div>
        <div class="chev">›</div>`;
      list.appendChild(a);
    });
  }
</script>
</body>
</html>
